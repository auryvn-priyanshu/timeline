<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIVYA-DATA | AI Life Timeline Oracle</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --blush: #FCE7F3;
            --lilac: #EDE9FE;
            --sky: #E0F2FE;
            --cream: #FFFDFB;
            --text-dark: #2D3748;
            --accent-pink: #F472B6;
            --accent-purple: #A78BFA;
            --glass: rgba(255, 255, 255, 0.6);
            --gradient: linear-gradient(135deg, #FCE7F3 0%, #EDE9FE 50%, #E0F2FE 100%);
            --btn-gradient: linear-gradient(90deg, #F472B6, #A78BFA);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Animated Cosmic Background */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: var(--gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 20s infinite alternate;
        }

        .orb-1 { width: 400px; height: 400px; background: var(--blush); top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: var(--sky); bottom: -50px; left: -50px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 80px); }
        }

        /* Layout */
        header {
            padding: 2rem;
            text-align: center;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 1.5rem;
            color: var(--accent-purple);
            margin-bottom: 0.5rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem 5rem;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #4A5568;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 2rem;
        }

        /* Form Styling */
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #4A5568;
        }

        input {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 2px solid transparent;
            background: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        input:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 4px var(--lilac);
        }

        .cta-btn {
            width: 100%;
            padding: 1.2rem;
            border: none;
            border-radius: 14px;
            background: var(--btn-gradient);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 20px rgba(244, 114, 182, 0.3);
            margin-top: 1rem;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(244, 114, 182, 0.4);
        }

        .cta-btn:active {
            transform: translateY(0);
        }

        /* Results Area */
        #result-area {
            display: none;
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin: 2rem 0;
        }

        .timeline-scroll {
            overflow-x: auto;
            padding: 1rem 0;
            display: flex;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .phase-card {
            min-width: 280px;
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border-top: 4px solid var(--accent-purple);
        }

        .phase-card.career { border-top-color: var(--sky); }
        .phase-card.love { border-top-color: var(--blush); }
        .phase-card.spirit { border-top-color: var(--lilac); }

        .phase-age {
            font-weight: 800;
            color: var(--accent-purple);
            font-size: 1.2rem;
        }

        .phase-title {
            font-weight: 700;
            margin: 0.5rem 0;
            font-family: 'Playfair Display', serif;
        }

        .phase-desc {
            font-size: 0.9rem;
            color: #718096;
        }

        /* Loading Spinner */
        #loader {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--blush);
            border-top: 5px solid var(--accent-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .glass-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header>
        <div class="brand">DIVYA-DATA</div>
    </header>

    <div class="container">
        <!-- Input Section -->
        <div id="input-section" class="glass-card">
            <h1>AI Life Timeline Oracle</h1>
            <p class="subtitle">Enter your birth essence to reveal the tapestry of your future destiny.</p>
            
            <div class="input-group">
                <label for="userName">Soul Name</label>
                <input type="text" id="userName" placeholder="Your name..." required>
            </div>

            <div class="input-group">
                <label for="birthDate">Birth Date</label>
                <input type="date" id="birthDate" required>
            </div>

            <div class="input-group">
                <label for="birthTime">Birth Time (Optional)</label>
                <input type="time" id="birthTime" value="12:00">
            </div>

            <button class="cta-btn" onclick="generateOracle()">Calculate My Destiny</button>
        </div>

        <!-- Loading -->
        <div id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; color: var(--accent-purple); font-weight: 600;">Consulting the stars...</p>
        </div>

        <!-- Result Section -->
        <div id="result-area">
            <div class="glass-card">
                <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 0.5rem;">Welcome, <span id="display-name" style="color: var(--accent-pink);"></span></h2>
                <p id="summary-text" style="color: #718096; font-size: 0.95rem; margin-bottom: 2rem;"></p>

                <div class="chart-container">
                    <canvas id="lifeChart"></canvas>
                </div>

                <h3 style="margin: 2rem 0 1rem; font-family: 'Playfair Display', serif;">Your Life Chapters (Age 0–80)</h3>
                <div class="timeline-scroll" id="timeline-container">
                    <!-- Dynamic Content -->
                </div>
            </div>

            <button class="cta-btn" style="background: white; color: var(--accent-purple); border: 2px solid var(--lilac);" onclick="resetOracle()">Recalculate Another Path</button>
        </div>
    </div>

    <script>
        let chartInstance = null;

        function generateOracle() {
            const name = document.getElementById('userName').value;
            const bDay = document.getElementById('birthDate').value;

            if (!name || !bDay) {
                alert("Please share your birth essence (Name & Date) with us.");
                return;
            }

            // Show Loader
            document.getElementById('input-section').style.display = 'none';
            document.getElementById('loader').style.display = 'flex';

            // Simulate AI Processing
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                renderResults(name, bDay);
            }, 2000);
        }

        function renderResults(name, bDay) {
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('display-name').innerText = name;
            
            const birthDate = new Date(bDay);
            const seed = birthDate.getDate() + birthDate.getMonth();
            
            const lifeData = calculateLifeMetrics(seed);
            const chapters = generateChapters(seed);

            document.getElementById('summary-text').innerText = `Based on your birth vibration, your journey is defined by a deep search for ${lifeData.soulPurpose}. You are currently entering a phase of ${lifeData.currentVibe}.`;

            renderChart(lifeData.vibrationLevels);
            renderTimeline(chapters);
        }

        function calculateLifeMetrics(seed) {
            // Semi-deterministic logic based on birth date (not purely random)
            const purposes = ["Emotional Mastery", "Creative Expression", "Ancestral Healing", "Spiritual Wisdom", "Leadership & Impact"];
            const vibes = ["Expansion", "Introspection", "Karmic Resolution", "Manifestation"];
            
            // Generate synthetic 80-year data curve
            const points = [];
            for (let i = 0; i <= 80; i += 5) {
                // Sinusoidal logic + birth seed offset
                let val = 50 + 30 * Math.sin((i / 10) + (seed / 5)) + (Math.random() * 10);
                points.push(Math.round(val));
            }

            return {
                soulPurpose: purposes[seed % purposes.length],
                currentVibe: vibes[seed % vibes.length],
                vibrationLevels: points
            };
        }

        function generateChapters(seed) {
            // Logic-based windows using age cycle philosophy
            const windows = [
                { age: "0-14", title: "Roots & Identity", desc: "The formation of your emotional core. Family dynamics shape your subconscious map.", type: "spirit" },
                { age: `${18 + (seed % 7)}-${24 + (seed % 5)}`, title: "The Great Awakening", desc: "A pivotal period for finding your voice and breaking free from ancestral expectations.", type: "love" },
                { age: `${27 + (seed % 4)}-33`, title: "Saturn's Crucible", desc: "Major career shift or structural change. Hard work now pays off for decades.", type: "career" },
                { age: `${34 + (seed % 6)}-42`, title: "The Wealth Peak", desc: "Material manifestation and influence. Your peak period for financial accumulation.", type: "career" },
                { age: `${45 + (seed % 5)}-52`, title: "Heart Resonance", desc: "A window for profound love or reconnection. Emotional maturity reaches its zenith.", type: "love" },
                { age: "60-70", title: "The Sage Transition", desc: "Turning knowledge into wisdom. Spiritual leadership and teaching others.", type: "spirit" },
                { age: "75+", title: "Legacy & Ether", desc: "Peaceful reflection and leaving a mark on the collective consciousness.", type: "spirit" }
            ];
            return windows;
        }

        function renderChart(dataPoints) {
            const ctx = document.getElementById('lifeChart').getContext('2d');
            
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60, 65, 70, 75, 80],
                    datasets: [{
                        label: 'Destiny Vibration',
                        data: dataPoints,
                        borderColor: '#A78BFA',
                        backgroundColor: 'rgba(167, 139, 250, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 4,
                        pointBackgroundColor: '#F472B6'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { display: false, min: 0, max: 100 },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#A0AEC0', font: { family: 'Plus Jakarta Sans' } }
                        }
                    }
                }
            });
        }

        function renderTimeline(chapters) {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';
            
            chapters.forEach(ch => {
                const card = document.createElement('div');
                card.className = `phase-card ${ch.type}`;
                card.innerHTML = `
                    <div class="phase-age">Age ${ch.age}</div>
                    <div class="phase-title">${ch.title}</div>
                    <p class="phase-desc">${ch.desc}</p>
                `;
                container.appendChild(card);
            });
        }

        function resetOracle() {
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('input-section').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
